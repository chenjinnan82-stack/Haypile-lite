name: Agent Handoff Issue / Agent 交接问题
description: Report HTTP, MCP, or asset-handoff trouble. / 反馈 HTTP、MCP 或 handoff 问题。
title: "[Agent]: "
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface / 接入方式
      options:
        - HTTP API
        - MCP
        - asset-handoff.json
        - Other / 其他
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / 问题
      description: What did the agent receive, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample / 最小样例
      description: Remove private paths, tokens, and personal URLs.
      render: json
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check / 边界确认
      options:
        - label: The agent did not directly read or modify storage/assets. / Agent 没有直接读取或修改 storage/assets。
