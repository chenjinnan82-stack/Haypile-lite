name: macOS app build

on:
  push:
    tags:
      - "v0.3.0-alpha.2"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Existing tag or commit to build
        required: true
        type: string
      release_tag:
        description: Existing prerelease tag to receive the ZIP
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    env:
      QT_QPA_PLATFORM: offscreen
      HAYPILE_UI_LANG: zh
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      source_commit: ${{ steps.source.outputs.commit }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
          fetch-depth: 0
      - id: source
        name: Verify source and release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag || (github.ref_type == 'tag' && github.ref_name) || '' }}
        run: |
          source_commit="$(git rev-parse HEAD)"
          if [[ -n "$RELEASE_TAG" ]]; then
            tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
            test -n "$tag_commit"
            test "$source_commit" = "$tag_commit"
          fi
          echo "commit=$source_commit" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
      - name: Run full test suite
        run: python -m unittest discover -s tests
      - name: Build and verify Apple Silicon app
        run: ./scripts/build_macos_app.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Haypile-v0.3.0-alpha.2-macos-arm64
          path: |
            dist/Haypile-v0.3.0-alpha.2-macos-arm64.app.zip
            dist/Haypile-v0.3.0-alpha.2-macos-arm64.app.zip.sha256
          if-no-files-found: error
      - name: Attest macOS archive
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/Haypile-v0.3.0-alpha.2-macos-arm64.app.zip

  release:
    if: github.ref_type == 'tag' || inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: Haypile-v0.3.0-alpha.2-macos-arm64
          path: dist
      - name: Upload prerelease assets without replacement
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          SOURCE_COMMIT: ${{ needs.build.outputs.source_commit }}
        run: |
          tag_commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" --jq .sha)"
          test "$SOURCE_COMMIT" = "$tag_commit"
          gh release upload "$RELEASE_TAG" \
            dist/Haypile-v0.3.0-alpha.2-macos-arm64.app.zip \
            dist/Haypile-v0.3.0-alpha.2-macos-arm64.app.zip.sha256
