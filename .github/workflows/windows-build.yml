name: Windows portable build

on:
  push:
    tags:
      - "v0.3.0-alpha.1"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional draft release tag to receive the ZIP
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      HAYPILE_UI_LANG: en
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64
      - name: Prepare build environment
        shell: pwsh
        run: |
          python -m venv .build-venv
          .\.build-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.build-venv\Scripts\python.exe -m pip install -r requirements-desktop.txt "Nuitka==4.0"
      - name: Run Windows tests
        shell: pwsh
        run: |
          .\.build-venv\Scripts\python.exe -m unittest tests/test_config_cors.py tests/test_ipc_config.py
          .\.build-venv\Scripts\python.exe -m unittest discover -s tests
      - name: Build portable package
        shell: pwsh
        run: .\scripts\build_windows_app.ps1 -SkipInstall
      - uses: actions/upload-artifact@v7
        with:
          name: Haypile-v0.3.0-alpha.1-windows-x64
          path: |
            dist/Haypile-v0.3.0-alpha.1-windows-x64.zip
            dist/Haypile-v0.3.0-alpha.1-windows-x64.zip.sha256
          if-no-files-found: error
      - name: Upload draft release assets
        if: github.ref_type == 'tag' || inputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          gh release upload "$env:RELEASE_TAG" `
            dist/Haypile-v0.3.0-alpha.1-windows-x64.zip `
            dist/Haypile-v0.3.0-alpha.1-windows-x64.zip.sha256 `
            --clobber
