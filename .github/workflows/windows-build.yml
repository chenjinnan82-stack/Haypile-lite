name: Windows portable build

on:
  push:
    tags:
      - "v0.3.0-alpha.6"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Existing tag or commit to build
        required: true
        type: string
      release_tag:
        description: Existing prerelease tag to receive the ZIP
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      QT_QPA_PLATFORM: offscreen
      HAYPILE_UI_LANG: en
    outputs:
      source_commit: ${{ steps.source.outputs.commit }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
          fetch-depth: 0
      - id: source
        name: Verify source and release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.release_tag || (github.ref_type == 'tag' && github.ref_name) || '' }}
        run: |
          $SourceCommit = (git rev-parse HEAD).Trim()
          if ($env:RELEASE_TAG) {
            $TagCommit = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
            if (-not $TagCommit -or $SourceCommit -ne $TagCommit) {
              throw "Release tag does not point at the checked-out source."
            }
          }
          "commit=$SourceCommit" >> $env:GITHUB_OUTPUT
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          architecture: x64
      - name: Prepare build environment
        shell: pwsh
        run: |
          python -m venv .build-venv
          .\.build-venv\Scripts\python.exe -m pip install --upgrade pip
          .\.build-venv\Scripts\python.exe -m pip install -r requirements-desktop.txt "Nuitka==4.0"
      - name: Run Windows tests
        shell: pwsh
        run: |
          .\.build-venv\Scripts\python.exe -m unittest tests/test_config_cors.py tests/test_ipc_config.py
          .\.build-venv\Scripts\python.exe -m unittest discover -s tests
      - name: Build portable package
        shell: pwsh
        run: .\scripts\build_windows_app.ps1 -SkipInstall
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Haypile-v0.3.0-alpha.6-windows-x64
          path: |
            dist/Haypile-v0.3.0-alpha.6-windows-x64.zip
            dist/Haypile-v0.3.0-alpha.6-windows-x64.zip.sha256
          if-no-files-found: error
      - name: Attest Windows archive
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/Haypile-v0.3.0-alpha.6-windows-x64.zip

  release:
    if: github.ref_type == 'tag' || inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: Haypile-v0.3.0-alpha.6-windows-x64
          path: dist
      - name: Upload prerelease assets without replacement
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          SOURCE_COMMIT: ${{ needs.build.outputs.source_commit }}
        run: |
          tag_commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" --jq .sha)"
          test "$SOURCE_COMMIT" = "$tag_commit"
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            dist/Haypile-v0.3.0-alpha.6-windows-x64.zip \
            dist/Haypile-v0.3.0-alpha.6-windows-x64.zip.sha256
