name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      HAYPILE_UI_LANG: zh
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0
      - run: python -m pip install -U pip
      - run: python -m pip install -r requirements.txt
      - run: python examples/public_smoke_demo.py --out /tmp/haypile-demo-ci
      - run: python -m unittest tests/test_agent_examples.py tests/test_mcp_server.py
      - run: python -m unittest discover -s tests
